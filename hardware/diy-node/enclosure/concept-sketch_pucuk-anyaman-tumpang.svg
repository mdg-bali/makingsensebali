<text x="402" y="434" class="cap">Airflow — cool air in low (BME680), warm out high (XIAO)</text>
<path class="water" marker-end="url(#wat)" d="M372,460 L390,460"/>
<text x="402" y="464" class="cap">Rain — sheds off every facet; nothing opens upward</text>
<path class="ap" d="M374,486 L388,486 M374,492 L388,492"/>
<text x="402" y="492" class="cap">Louvers / apertures hide in a facet's rain-shadow</text>
<rect class="part" x="374" y="512" width="15" height="15"/>
<text x="402" y="523" class="cap">Flat back · keyhole mount · service from below</text>
