<svg viewBox="0 0 860 600" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Three concept directions for the Plus air-quality node body</title>
<desc>Massing studies. Three faceted enclosure silhouettes — a twisted shard (Pucuk), a woven lattice over a liner (Anyaman), and faceted stacked meru tiers (Tumpang) — above a shared cutaway showing the passive chimney: cool air in low past the BME680, warm air out high past the XIAO, a separate duct for the HM3301 particulate sensor, rain shedding off every facet, and no opening that faces upward.</desc>
<style>
  text{fill:#222;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}
  .ttl{font-size:19px;font-weight:700}
  .sub{font-size:12px;opacity:.6}
  .lbl{font-size:16px;font-weight:650}
  .id{font-size:12px;opacity:.62}
  .sec{font-size:14.5px;font-weight:600}
  .cap{font-size:11px;opacity:.72}
  .out{fill:#2222;fill-opacity:.05;stroke:#222;stroke-width:2;stroke-linejoin:round}
  .facet{fill:none;stroke:#222;stroke-width:1;stroke-opacity:.5}
  .weave{fill:none;stroke:#222;stroke-width:1;stroke-opacity:.5}
  .wall{stroke:#222;stroke-width:1;stroke-opacity:.32;fill:none}
  .part{fill:#222;fill-opacity:.09;stroke:#222;stroke-width:1.1}
  .air{fill:none;stroke:#E0922E;stroke-width:2.2}
  .water{fill:none;stroke:#3E8FC4;stroke-width:1.7;stroke-opacity:.9}
  .ap{stroke:#E0922E;stroke-width:2.4;stroke-linecap:round;fill:#E0922E}
</style>
<defs>
  <marker id="air" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,1 L8,4.5 L0,8 Z" fill="#E0922E"/></marker>
  <marker id="wat" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto"><path d="M0,1 L7,4 L0,7 Z" fill="#3E8FC4"/></marker>
  <clipPath id="c2"><path d="M388,350 L388,150 L414,118 L452,150 L466,250 L458,350 Z"/></clipPath>
</defs>

<text x="30" y="34" class="ttl">Plus body — three concept directions</text>
<text x="30" y="55" class="sub">Massing only · all three run the same chimney and shed rain the same way · faceted / triangulated skin</text>
<line x1="30" y1="70" x2="830" y2="70" class="wall"/>

<text x="30" y="98" class="lbl">C1 · Pucuk</text>
<text x="30" y="116" class="id">Twisted shard — one piece</text>
<line x1="104" y1="350" x2="212" y2="350" class="wall"/>
<path class="out" d="M118,350 L118,140 L150,108 L182,156 L172,200 L196,232 L180,276 L200,312 L192,350 Z"/>
