<text x="310" y="98" class="lbl">C2 · Anyaman</text>
<text x="310" y="116" class="id">Woven lattice over a liner</text>
<line x1="378" y1="350" x2="472" y2="350" class="wall"/>
<path class="out" d="M388,350 L388,150 L414,118 L452,150 L466,250 L458,350 Z"/>
