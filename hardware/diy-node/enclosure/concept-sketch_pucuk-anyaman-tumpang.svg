<circle cx="427" cy="330" r="3.4" fill="#E0922E"/>
<circle cx="423" cy="150" r="3.4" fill="#E0922E"/>

<text x="590" y="98" class="lbl">C3 · Tumpang</text>
<text x="590" y="116" class="id">Faceted meru tiers</text>
