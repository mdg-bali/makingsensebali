<rect class="part" x="172" y="436" width="12" height="98"/>
<rect class="part" x="160" y="450" width="12" height="62"/>
<text x="150" y="430" class="cap">HM3301 · own duct</text>
<path class="ap" d="M162,512 L162,519 M168,512 L168,519"/>
